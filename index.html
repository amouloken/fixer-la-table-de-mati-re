<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accéder au produit</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 30px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 15px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      background: #22c55e;
      color: white;
      padding: 16px 32px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #16a34a;
      transform: scale(1.05);
    }

    .note {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Accédez à mon produit</h1>

    <p>
      Cliquez sur le bouton ci-dessous pour être redirigé vers la page de paiement sécurisée Stripe.
    </p>

    <a class="btn" href="TON_LIEN_STRIPE_ICI" target="_blank">
      Acheter maintenant
    </a>

    <p class="note">
      Paiement sécurisé via Stripe.
    </p>
  </div>

</body>
</html>
